server:
  port: 8080

spring:
  application:
    name: api-gateway

jwt:
  secret: ${JWT_SECRET:reciclape-clave-secreta-jwt-cambiar-en-produccion-2026-cibertec}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:4200}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: always
