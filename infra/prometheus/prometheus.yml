global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'auth-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['auth-service:8081']

  - job_name: 'recojo-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['recojo-service:8082']

  - job_name: 'reporte-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['reporte-service:8083']

  - job_name: 'eureka-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['eureka-server:8761']
