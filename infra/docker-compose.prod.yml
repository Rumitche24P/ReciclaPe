# ReciclaPe - Despliegue en produccion (1 VM + Docker, p. ej. Oracle Cloud).
#
#   cd infra
#   cp .env.example .env        # y edita los secretos
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build
#
# Solo Caddy publica puertos (80/443); el resto queda en la red interna.

name: reciclape

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [reciclape-net]
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [reciclape-net]
    restart: unless-stopped

  eureka-server:
    build:
      context: ../backend
      dockerfile: eureka-server/Dockerfile
    networks: [reciclape-net]
    restart: unless-stopped

  auth-service:
    build:
      context: ../backend
      dockerfile: auth-service/Dockerfile
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_URL: http://eureka-server:8761/eureka
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres: { condition: service_healthy }
      eureka-server: { condition: service_started }
    networks: [reciclape-net]
    restart: unless-stopped

  recojo-service:
    build:
      context: ../backend
      dockerfile: recojo-service/Dockerfile
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      EUREKA_URL: http://eureka-server:8761/eureka
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      eureka-server: { condition: service_started }
    networks: [reciclape-net]
    restart: unless-stopped

  reporte-service:
    build:
      context: ../backend
      dockerfile: reporte-service/Dockerfile
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      EUREKA_URL: http://eureka-server:8761/eureka
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      eureka-server: { condition: service_started }
    networks: [reciclape-net]
    restart: unless-stopped

  api-gateway:
    build:
      context: ../backend
      dockerfile: api-gateway/Dockerfile
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      eureka-server: { condition: service_started }
    networks: [reciclape-net]
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        # Vacio = el navegador llama a /api en el mismo dominio; Caddy lo enruta al gateway.
        API_BASE: ""
    depends_on:
      - api-gateway
    networks: [reciclape-net]
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - api-gateway
    networks: [reciclape-net]
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:

networks:
  reciclape-net:
    driver: bridge
